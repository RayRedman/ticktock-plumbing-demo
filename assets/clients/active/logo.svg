<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Clock icon -->
  <g transform="translate(8, 10)">
    <circle cx="35" cy="40" r="34" fill="none" stroke="#0D1B2A" stroke-width="2.5"/>
    <!-- Clock face -->
    <circle cx="35" cy="40" r="20" fill="none" stroke="#1E88E5" stroke-width="2.5"/>
    <!-- Clock hands -->
    <line x1="35" y1="40" x2="35" y2="28" stroke="#0D1B2A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="35" y1="40" x2="44" y2="40" stroke="#1E88E5" stroke-width="2" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="35" cy="40" r="2" fill="#1E88E5"/>
    <!-- Water drop at 6 o'clock -->
    <path d="M35 54 C33 57, 33 60, 35 61 C37 60, 37 57, 35 54 Z" fill="#1E88E5"/>
  </g>

  <!-- Company Name -->
  <text x="88" y="28" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="13" fill="#1E88E5" letter-spacing="3">TICKTOCK</text>
  <text x="88" y="54" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="17" fill="#0D1B2A" letter-spacing="1">PLUMBING SERVICES</text>
  <text x="88" y="74" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="11" fill="#0D1B2A" letter-spacing="4">ON TIME &#x2022; EVERY TIME &#x2022; 24/7</text>
</svg>
